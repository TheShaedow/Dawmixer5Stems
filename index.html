<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dawmixer 5 Stems</title>
<style>
:root{--bg:#070b10;--panel:#111923;--panel2:#0a1017;--line:#31404e;--txt:#f3f7fb;--muted:#9aa9b7;--blue:#48cfff;--green:#54df70;--yellow:#ffd13d;--red:#ff4b4b}
*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;background:#05080c;color:var(--txt);font-family:Arial,Helvetica,sans-serif;overflow-x:auto}body{background:radial-gradient(circle at 30% 0,rgba(72,207,255,.12),transparent 34%),linear-gradient(180deg,#101821,#05080c)}
.app{width:min(100%,1180px);margin:0 auto;padding:12px}.top{display:grid;grid-template-columns:1fr auto auto auto;gap:14px;align-items:center;margin-bottom:14px;padding:12px 14px;background:linear-gradient(#121b25,#081018);border:1px solid #22313e;border-radius:14px;box-shadow:0 16px 40px #0008}.brand{font-size:26px;font-weight:900;letter-spacing:-1px;text-transform:uppercase}.brand span{color:var(--red)}
.transport{display:flex;border:1px solid #334352;border-radius:9px;overflow:hidden}.transport button{width:66px;height:48px;font-size:24px;border:0;border-right:1px solid #334352;background:linear-gradient(#1d2834,#111821);color:white;cursor:pointer}.transport button:last-child{border-right:0}.time,.masterRead{height:48px;display:grid;place-items:center;padding:0 28px;background:#05090e;border:1px solid #253544;border-radius:9px;color:var(--blue);font:700 25px/1 monospace}.masterRead{min-width:118px}.export{height:48px;padding:0 24px;border:1px solid var(--blue);border-radius:9px;background:#0b1219;color:white;font-weight:800;font-size:16px;cursor:pointer}
.mixer{display:grid;grid-template-columns:repeat(5,minmax(150px,1fr)) minmax(150px,1fr);gap:10px}.strip{min-height:735px;display:flex;flex-direction:column;background:linear-gradient(160deg,#151f2a,#071018);border:1px solid #354655;border-radius:12px;padding:12px;box-shadow:inset 0 1px 0 #ffffff10,0 14px 30px #0006}.chHead{display:flex;justify-content:center;align-items:center;height:35px}.badge{min-width:34px;height:30px;border-radius:5px;display:grid;place-items:center;background:var(--c);color:#071018;font-weight:900;font-size:14px;padding:0 8px;white-space:nowrap}.masterTitle{font-size:20px;font-weight:900;text-align:center;margin-top:12px;letter-spacing:.04em}.upload{position:relative;display:block;margin:10px auto 10px;width:86%;height:42px;border:1px solid #394b5a;border-radius:7px;background:linear-gradient(#151f2a,#071018);color:#fff;font-weight:800;text-align:center;line-height:42px;cursor:pointer}.upload input{position:absolute;inset:0;opacity:0;cursor:pointer}.waveBox{height:86px;border:1px solid #182632;background:#03070b;border-radius:6px;overflow:hidden}.waveBox canvas{width:100%;height:62px;display:block}.dur{height:24px;border-top:1px solid #263746;color:#c3ccd4;display:grid;place-items:center;font:16px monospace}.eq{display:grid;gap:9px;margin:14px 0 10px;justify-content:center}.eqRow{display:grid;grid-template-columns:62px 50px;gap:8px;align-items:center}.eqLabel{font-weight:800;text-align:left}.eqLabel small{display:block;color:#ddd;font-weight:400}.knob{width:60px;height:60px;border-radius:50%;appearance:none;background:radial-gradient(circle,#202832 0 44%,#05080b 46% 58%,transparent 60%),conic-gradient(from -135deg,var(--accent) calc(var(--val,50)*1%),#394650 0 75%,transparent 0);border:1px solid #465764;cursor:pointer}.knob::-webkit-slider-thumb{appearance:none;width:9px;height:9px;background:white;border-radius:50%;box-shadow:0 -22px 0 var(--accent)}.knob::-moz-range-thumb{width:9px;height:9px;border:0;background:white;border-radius:50%}.solo,.mute{display:block;width:72%;height:38px;margin:7px auto;border:1px solid var(--c);border-radius:6px;background:#071018;color:white;font-weight:900;font-size:14px;cursor:pointer}.solo.active{background:color-mix(in srgb,var(--c) 28%,#071018);box-shadow:0 0 14px color-mix(in srgb,var(--c) 45%,transparent)}.mute{border-color:#576675;color:#d8e0e8}.mute.active{background:rgba(255,75,75,.18);border-color:var(--red);color:#ffb9b9;box-shadow:0 0 12px rgba(255,75,75,.28)}
.faderZone{display:grid;grid-template-columns:45px 1fr 27px;gap:9px;align-items:end;margin-top:auto}.scale{height:270px;display:flex;flex-direction:column;justify-content:space-between;text-align:right;color:#c5d0d9;font-size:14px}.faderWrap{height:280px;display:flex;justify-content:center;align-items:center}.vfader{writing-mode:vertical-lr;direction:rtl;width:44px;height:270px;accent-color:#dfe7ee;cursor:pointer}.meter{height:270px;width:19px;border:1px solid #26323d;background:#020508;border-radius:4px;overflow:hidden;display:flex;align-items:end;padding:2px}.meterFill{width:100%;height:0%;background:linear-gradient(0deg,#58d600 0 55%,#d6cf00 55% 75%,#d88400 75% 88%,#d61d1d 88%);transition:height .05s}.db{margin:14px auto 0;width:86%;height:42px;display:grid;place-items:center;background:#05090e;border:1px solid #273746;border-radius:7px;color:var(--c);font:800 20px monospace}.master .db{color:var(--blue)}.master{--c:var(--blue)}
@media(max-width:900px){html,body{overflow-x:hidden}.app{width:100%;padding:8px}.top{grid-template-columns:1fr;justify-items:center;gap:8px}.brand{font-size:22px;text-align:center}.time,.masterRead{height:42px;font-size:20px;padding:0 16px}.export{height:42px;padding:0 16px}.transport button{width:56px;height:42px}.mixer{display:flex;width:100%;overflow-x:auto;gap:8px;padding-bottom:10px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}.strip{min-width:152px;max-width:152px;min-height:690px;padding:9px;scroll-snap-align:start}.waveBox{height:78px}.eqRow{grid-template-columns:54px 40px;gap:5px}.eqLabel{font-size:13px}.knob{width:48px;height:48px}.solo,.mute{width:82%;height:34px;font-size:13px;margin:5px auto}.faderZone{grid-template-columns:34px 1fr 22px;gap:6px}.scale{font-size:11px}.db{font-size:17px;height:38px}}@media(max-width:520px){.app{padding:6px}.top{border-radius:10px}.mixer{gap:7px}.strip{min-width:142px;max-width:142px;min-height:665px;padding:8px}.badge{min-width:30px;height:27px;font-size:16px}.upload{width:94%;font-size:12px;height:36px;line-height:36px}.waveBox{height:70px}.waveBox canvas{height:50px}.dur{height:20px;font-size:13px}.eq{gap:7px;margin:10px 0 8px}.knob{width:44px;height:44px}.vfader{height:250px}.scale,.meter{height:250px}.faderWrap{height:260px}.masterTitle{font-size:18px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand">DAW<span>MIXER</span> 5 STEMS</div><div class="transport"><button id="play">▶</button><button id="stop">■</button></div><div class="time" id="time">00:00.000</div><button class="export" id="export">↧ EXPORT WAV</button><div class="masterRead" id="masterTop">0.0 dB</div></header>
<main class="mixer" id="mixer"></main>
</div>
<script>
const AudioCtx=window.AudioContext||window.webkitAudioContext,ctx=new AudioCtx();
const names=['Bass','Drums','Gitarre','Keys','Vocals'],colors=['#48cfff','#54df70','#ffd13d','#ff4b4b','#b56cff'];
// Default-Stems: Diese 5 MP3-Dateien liegen im gleichen GitHub-Ordner wie diese index.html.
// Dateinamen müssen exakt stimmen, inklusive Groß-/Kleinschreibung.
const DEFAULT_STEMS=[
  {name:'Bass',url:'Bass.mp3'},
  {name:'Drums',url:'Drums.mp3'},
  {name:'Gitarre',url:'Gitarre.mp3'},
  {name:'Keyboards',url:'Keyboards.mp3'},
  {name:'Vocals',url:'Vocals.mp3'}
];
const masterIn=ctx.createGain(),masterOut=ctx.createGain(),masterAnalyser=ctx.createAnalyser();masterOut.gain.value=1;masterIn.connect(masterOut);masterOut.connect(masterAnalyser);masterAnalyser.connect(ctx.destination);masterAnalyser.fftSize=512;
let channels=[],playing=false,startAt=0,pauseAt=0,raf=0;
const mixer=document.getElementById('mixer');
function db(v){return (20*Math.log10(Math.max(v,.0001))).toFixed(1)+' dB'}
function fmt(t){let m=Math.floor(t/60),s=Math.floor(t%60),ms=Math.floor((t%1)*1000);return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`}
function knob(el,v,min,max){el.style.setProperty('--val',((v-min)/(max-min)*75).toFixed(1))}
function mkChannel(i){const c={i,color:colors[i],buffer:null,src:null,solo:false,mute:false,vol:1};c.gain=ctx.createGain();c.low=ctx.createBiquadFilter();c.mid=ctx.createBiquadFilter();c.high=ctx.createBiquadFilter();c.meter=ctx.createAnalyser();c.low.type='lowshelf';c.low.frequency.value=180;c.mid.type='peaking';c.mid.frequency.value=1000;c.mid.Q.value=.9;c.high.type='highshelf';c.high.frequency.value=6500;c.gain.connect(c.low);c.low.connect(c.mid);c.mid.connect(c.high);c.high.connect(c.meter);c.meter.connect(masterIn);channels.push(c);
let el=document.createElement('section');el.className='strip';el.style.setProperty('--c',c.color);el.innerHTML=`<div class="chHead"><div class="badge">${names[i]}</div></div><label class="upload">STEM ERSETZEN ⤴<input type="file" accept="audio/mpeg,audio/mp3,audio/wav,audio/*"></label><div class="waveBox"><canvas></canvas><div class="dur">0:00 / 0:00</div></div><div class="eq"><div class="eqRow"><input class="knob hi" style="--accent:var(--blue)" type="range" min="-15" max="15" step=".1" value="0"><div class="eqLabel">HI</div></div><div class="eqRow"><input class="knob mid" style="--accent:var(--green)" type="range" min="-15" max="15" step=".1" value="0"><div class="eqLabel">MID<small>1kHz</small></div></div><div class="eqRow"><input class="knob lo" style="--accent:var(--yellow)" type="range" min="-15" max="15" step=".1" value="0"><div class="eqLabel">LO</div></div></div><button class="solo">SOLO</button><button class="mute">MUTE</button><div class="faderZone"><div class="scale"><span>+10</span><span>5</span><span>0</span><span>-5</span><span>-10</span><span>-20</span><span>-30</span><span>-40</span><span>-∞</span></div><div class="faderWrap"><input class="vfader vol" type="range" min="0" max="1.6" step=".01" value="1"></div><div class="meter"><div class="meterFill"></div></div></div><div class="db">0.0 dB</div>`;mixer.appendChild(el);c.el=el;c.canvas=el.querySelector('canvas');c.dur=el.querySelector('.dur');c.fill=el.querySelector('.meterFill');c.read=el.querySelector('.db');
el.querySelector('input[type=file]').onchange=e=>load(i,e.target.files[0]);el.querySelector('.solo').onclick=e=>{c.solo=!c.solo;e.target.classList.toggle('active',c.solo);applyMixState()};el.querySelector('.mute').onclick=e=>{c.mute=!c.mute;e.target.classList.toggle('active',c.mute);applyMixState()};el.querySelector('.vol').oninput=e=>{c.vol=+e.target.value;applyMixState();c.read.textContent=db(c.vol)};el.querySelector('.hi').oninput=e=>{let v=+e.target.value;c.high.gain.setValueAtTime(v,ctx.currentTime);knob(e.target,v,-15,15)};el.querySelector('.mid').oninput=e=>{let v=+e.target.value;c.mid.gain.setValueAtTime(v,ctx.currentTime);knob(e.target,v,-15,15)};el.querySelector('.lo').oninput=e=>{let v=+e.target.value;c.low.gain.setValueAtTime(v,ctx.currentTime);knob(e.target,v,-15,15)};el.querySelectorAll('.knob').forEach(k=>knob(k,+k.value,+k.min,+k.max));}
function mkMaster(){let el=document.createElement('section');el.className='strip master';el.innerHTML=`<div class="masterTitle">MASTER</div><div class="faderZone"><div class="scale"><span>+10</span><span>5</span><span>0</span><span>-5</span><span>-10</span><span>-20</span><span>-30</span><span>-40</span><span>-∞</span></div><div class="faderWrap"><input id="masterVol" class="vfader" type="range" min="0" max="1.6" step=".01" value="1"></div><div class="meter"><div id="masterFill" class="meterFill"></div></div></div><div class="db" id="masterDb">0.0 dB</div>`;mixer.appendChild(el);document.getElementById('masterVol').oninput=e=>{let v=+e.target.value;masterOut.gain.setValueAtTime(v,ctx.currentTime);document.getElementById('masterDb').textContent=db(v);document.getElementById('masterTop').textContent=db(v)}}
for(let i=0;i<5;i++)mkChannel(i);mkMaster();loadDefaultStems();
function setBuffer(i,b,label='STEM ERSETZEN ⤴'){let c=channels[i];c.buffer=b;c.dur.textContent='0:00 / '+fmt(b.duration).slice(3,8);drawWave(c);let up=c.el.querySelector('.upload');if(up)up.childNodes[0].nodeValue='STEM ERSETZEN ⤴ ';}
async function load(i,file){if(!file)return;await ctx.resume();let b=await ctx.decodeAudioData(await file.arrayBuffer());setBuffer(i,b,file.name)}
async function loadDefaultStems(){for(let i=0;i<Math.min(DEFAULT_STEMS.length,channels.length);i++){let stem=DEFAULT_STEMS[i];if(!stem||!stem.url)continue;try{let res=await fetch(stem.url,{cache:'no-store'});if(!res.ok)throw new Error(res.status+' '+res.statusText);let b=await ctx.decodeAudioData(await res.arrayBuffer());setBuffer(i,b,stem.name||('Stem '+(i+1)))}catch(err){console.warn('Default-Stem konnte nicht geladen werden:',stem.url,err)}}}
function drawWave(c){let canvas=c.canvas,r=canvas.getBoundingClientRect(),dpr=devicePixelRatio||1;canvas.width=Math.max(220,r.width*dpr);canvas.height=62*dpr;let g=canvas.getContext('2d'),data=c.buffer.getChannelData(0),step=Math.ceil(data.length/canvas.width),amp=canvas.height/2;g.clearRect(0,0,canvas.width,canvas.height);g.strokeStyle=c.color;g.lineWidth=1;g.beginPath();for(let x=0;x<canvas.width;x++){let min=1,max=-1;for(let j=0;j<step;j++){let v=data[x*step+j]||0;if(v<min)min=v;if(v>max)max=v}g.moveTo(x,(1+min)*amp);g.lineTo(x,(1+max)*amp)}g.stroke()}
function applyMixState(){let any=channels.some(c=>c.solo);channels.forEach(c=>c.gain.gain.setValueAtTime((c.mute||(any&&!c.solo))?0:c.vol,ctx.currentTime))}
function source(c,off){if(!c.buffer)return;let s=ctx.createBufferSource();s.buffer=c.buffer;s.connect(c.gain);c.src=s;s.start(0,Math.min(off,c.buffer.duration-.001))}
async function play(){if(playing)return;if(!channels.some(c=>c.buffer)){alert('Bitte zuerst WAV laden.');return}await ctx.resume();applyMixState();startAt=ctx.currentTime-pauseAt;channels.forEach(c=>source(c,pauseAt));playing=true;tick()}
function pause(){channels.forEach(c=>{try{c.src&&c.src.stop()}catch(e){}});pauseAt=ctx.currentTime-startAt;playing=false;cancelAnimationFrame(raf)}
function stop(){channels.forEach(c=>{try{c.src&&c.src.stop()}catch(e){}});pauseAt=0;playing=false;document.getElementById('time').textContent='00:00.000';cancelAnimationFrame(raf)}
function tick(){if(!playing)return;let t=ctx.currentTime-startAt;document.getElementById('time').textContent=fmt(t);meters();raf=requestAnimationFrame(tick)}
function meters(){let arr=new Uint8Array(256);channels.forEach(c=>{c.meter.getByteFrequencyData(arr);let a=arr.reduce((x,y)=>x+y,0)/arr.length/255;c.fill.style.height=Math.min(100,a*170)+'%'});masterAnalyser.getByteFrequencyData(arr);let a=arr.reduce((x,y)=>x+y,0)/arr.length/255;document.getElementById('masterFill').style.height=Math.min(100,a*170)+'%'}
document.getElementById('play').onclick=()=>playing?pause():play();document.getElementById('stop').onclick=stop;
document.getElementById('export').onclick=async()=>{let len=Math.ceil(Math.max(0,...channels.map(c=>c.buffer?c.buffer.duration:0))*ctx.sampleRate);if(!len){alert('Bitte zuerst WAV laden.');return}let off=new OfflineAudioContext(2,len,ctx.sampleRate),dest=off.createGain();dest.gain.value=masterOut.gain.value;dest.connect(off.destination);channels.forEach(c=>{if(!c.buffer||c.mute)return;let any=channels.some(x=>x.solo);if(any&&!c.solo)return;let s=off.createBufferSource(),g=off.createGain(),lo=off.createBiquadFilter(),mid=off.createBiquadFilter(),hi=off.createBiquadFilter();s.buffer=c.buffer;g.gain.value=c.vol;lo.type='lowshelf';lo.frequency.value=180;lo.gain.value=c.low.gain.value;mid.type='peaking';mid.frequency.value=1000;mid.Q.value=.9;mid.gain.value=c.mid.gain.value;hi.type='highshelf';hi.frequency.value=6500;hi.gain.value=c.high.gain.value;s.connect(g);g.connect(lo);lo.connect(mid);mid.connect(hi);hi.connect(dest);s.start(0)});let rendered=await off.startRendering();download(wav(rendered),'ymc-mix.wav')};
function download(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function wav(buffer){let ch=buffer.numberOfChannels,len=buffer.length*ch*2+44,ab=new ArrayBuffer(len),v=new DataView(ab),o=0;function w(s){for(let i=0;i<s.length;i++)v.setUint8(o++,s.charCodeAt(i))}w('RIFF');v.setUint32(o,len-8,true);o+=4;w('WAVE');w('fmt ');v.setUint32(o,16,true);o+=4;v.setUint16(o,1,true);o+=2;v.setUint16(o,ch,true);o+=2;v.setUint32(o,buffer.sampleRate,true);o+=4;v.setUint32(o,buffer.sampleRate*ch*2,true);o+=4;v.setUint16(o,ch*2,true);o+=2;v.setUint16(o,16,true);o+=2;w('data');v.setUint32(o,len-o-4,true);o+=4;for(let i=0;i<buffer.length;i++)for(let c=0;c<ch;c++){let s=Math.max(-1,Math.min(1,buffer.getChannelData(c)[i]));v.setInt16(o,s<0?s*0x8000:s*0x7fff,true);o+=2}return new Blob([ab],{type:'audio/wav'})}
addEventListener('resize',()=>channels.forEach(c=>c.buffer&&drawWave(c)));
</script>
</body>
</html>
